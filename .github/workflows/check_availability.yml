name: ドメイン取得可否チェック (whois)

# 手動トリガーのみ
on:
  workflow_dispatch:
    inputs:
      domain:
        description: '対象ドメイン (候補CSVの場所 results/{domain}/candidates.csv)'
        required: true
        default: 'skincare-univ.com'
        type: string
      include_alive:
        description: '生存ドメイン (is_alive=True) もチェックするか'
        required: true
        default: false
        type: boolean
      include_subdomains:
        description: 'サブドメイン/IPアドレスもチェックするか'
        required: true
        default: false
        type: boolean
      limit:
        description: '処理上限 (0=無制限)'
        required: true
        default: '0'
        type: string
      sleep:
        description: 'whois リクエスト間 sleep 秒数 (.jp 系は3秒以上推奨)'
        required: true
        default: '3'
        type: string
      commit_results:
        description: '結果をブランチにコミットするか'
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: whois コマンドをインストール
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y whois

      - name: candidates.csv の存在確認
        run: |
          DOMAIN="${{ github.event.inputs.domain }}"
          TARGET="results/$DOMAIN/candidates.csv"
          if [ ! -f "$TARGET" ]; then
            echo "エラー: $TARGET が見つかりません"
            echo "先に wayback_extract ワークフローを $DOMAIN で実行してください"
            exit 1
          fi
          echo "$TARGET の行数:"
          wc -l "$TARGET"

      - name: whois チェック実行
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.include_alive }}" = "true" ]; then
            ARGS="$ARGS --include-alive"
          fi
          if [ "${{ github.event.inputs.include_subdomains }}" = "true" ]; then
            ARGS="$ARGS --include-subdomains"
          fi
          python check_availability.py \
            --source-domain "${{ github.event.inputs.domain }}" \
            --limit "${{ github.event.inputs.limit }}" \
            --sleep "${{ github.event.inputs.sleep }}" \
            $ARGS

      - name: 結果サマリ
        if: always()
        run: |
          DOMAIN="${{ github.event.inputs.domain }}"
          TARGET="results/$DOMAIN/availability.csv"
          echo "=== $TARGET (上位30行) ==="
          head -30 "$TARGET" 2>/dev/null || echo "(なし)"
          echo ""
          echo "=== 取得可能ドメイン一覧 ==="
          awk -F',' 'NR>1 && $2=="available" { print $1, "(link_count="$5")" }' "$TARGET" 2>/dev/null || true

      - name: Artifacts としてアップロード
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: availability-${{ github.run_id }}
          path: results/${{ github.event.inputs.domain }}/availability.csv
          if-no-files-found: warn
          retention-days: 14

      - name: 結果をブランチにコミット
        if: ${{ inputs.commit_results == true && always() }}
        run: |
          DOMAIN="${{ github.event.inputs.domain }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "results/$DOMAIN/availability.csv" 2>/dev/null || true
          git reset -- csv/post.csv 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "コミットする変更なし"
          else
            git commit -m "whois可否チェック: $DOMAIN"
            git pull --rebase origin "$GITHUB_REF_NAME" || true
            git push origin "HEAD:$GITHUB_REF_NAME"
          fi
