name: WordPress 自動投稿

on:
  push:
    paths:
      - 'csv/post_*.csv'
  workflow_dispatch:
    inputs:
      csv_file:
        description: '投稿するCSVファイル名（例: post_001.csv）'
        required: true
      status:
        description: '投稿ステータス'
        required: true
        default: 'draft'
        type: choice
        options:
          - draft
          - publish

jobs:
  post-to-wordpress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: wp_config.py を生成
        env:
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: |
          python3 -c "
          import os
          config = '''WP_CONFIG = {
              \"site_url\": \"https://civichat.jp\",
              \"username\": \"''' + os.environ['WP_USERNAME'] + '''\",
              \"app_password\": \"''' + os.environ['WP_APP_PASSWORD'] + '''\",
          }
          '''
          with open('wp_config.py', 'w') as f:
              f.write(config)
          "
          echo "wp_config.py を生成しました"
          cat wp_config.py

      - name: CSV記事を投稿
        run: |
          if [ -n "${{ github.event.inputs.csv_file }}" ]; then
            CSV_FILE="csv/${{ github.event.inputs.csv_file }}"
            STATUS="${{ github.event.inputs.status }}"
            echo "=== 手動実行: $CSV_FILE (status: $STATUS) ==="
            python wp_bulk_post.py "$CSV_FILE" --status "$STATUS"
          else
            echo "=== push トリガー: 変更CSVを検出中 ==="
            FOUND=0
            for f in csv/post_*.csv; do
              if [ -f "$f" ]; then
                echo "=== $f を投稿中 ==="
                python wp_bulk_post.py "$f" --status draft
                FOUND=1
              fi
            done
            if [ "$FOUND" -eq 0 ]; then
              echo "投稿対象のCSVが見つかりませんでした"
            fi
          fi
