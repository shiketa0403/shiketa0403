name: ドメイン履歴調査

on:
  workflow_dispatch:
    inputs:
      domains:
        description: 'ドメインリスト（カンマ区切り）。空欄なら csv/domains.txt から読み込み'
        required: false
        type: string

permissions:
  contents: write

jobs:
  check-domains:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ドメインリストファイルを作成
        run: |
          INPUT="${{ github.event.inputs.domains }}"
          if [ -n "$INPUT" ]; then
            echo "カンマ区切り入力からドメインリストを作成"
            echo "$INPUT" | tr ',' '\n' | sed 's/^ *//;s/ *$//' | grep -v '^$' > domains.txt
          elif [ -f csv/domains.txt ]; then
            echo "csv/domains.txt からドメインリストを読み込み"
            grep -v '^\s*#' csv/domains.txt | grep -v '^\s*$' > domains.txt
          else
            echo "ERROR: ドメインが指定されていません。入力欄にカンマ区切りで入力するか、csv/domains.txt を作成してください。"
            exit 1
          fi
          echo "=== 調査対象ドメイン ==="
          cat domains.txt
          echo "=== $(wc -l < domains.txt) 件 ==="

      - name: 依存パッケージをインストール
        run: pip install aiohttp

      - name: ドメイン履歴を調査
        run: python domain_check.py domains.txt -o domain_history.csv
        timeout-minutes: 180

      - name: 結果CSVを表示
        if: always()
        run: |
          if [ -f domain_history.csv ]; then
            echo "=== 結果CSV ==="
            cat domain_history.csv
          fi

      - name: 結果CSVをリポジトリにコミット
        if: always()
        run: |
          if [ -f domain_history.csv ]; then
            cp domain_history.csv csv/domain_history.csv
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add csv/domain_history.csv
            git diff --cached --quiet || git commit -m "ドメイン履歴調査結果を更新"
            git push
          fi
