name: X 自動投稿

on:
  workflow_dispatch:
    inputs:
      interval_minutes:
        description: '投稿間隔（分）'
        required: true
        default: '30'
        type: choice
        options:
          - '10'
          - '15'
          - '20'
          - '30'
          - '40'
          - '45'
          - '60'
      duration_hours:
        description: '実行時間（時間・最大6）'
        required: true
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
          - '6'
      worksheet_name:
        description: 'シート名（空欄なら 1 枚目）'
        required: false
        default: ''
        type: string

jobs:
  post-to-x:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Python 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: X に投稿
        env:
          X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          X_CT0: ${{ secrets.X_CT0 }}
          GSPREAD_SHEET_ID: ${{ secrets.GSPREAD_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GSPREAD_WORKSHEET_NAME: ${{ inputs.worksheet_name }}
          INTERVAL_MINUTES: ${{ inputs.interval_minutes }}
          DURATION_HOURS: ${{ inputs.duration_hours }}
          PYTHONUNBUFFERED: '1'
        run: python -u x_post.py
