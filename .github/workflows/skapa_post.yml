name: スカパー記事を下書き投稿

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'チャンネル名 / スラッグ / No（例: エムオン / m-on / 28）'
        required: true
        type: string
      status:
        description: '投稿ステータス'
        required: false
        type: choice
        default: 'draft'
        options:
          - draft
          - publish
          - private

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存ライブラリのインストール
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright python-dotenv
          python -m playwright install --with-deps chromium

      - name: 08_final.html の存在確認
        env:
          CHANNEL: ${{ github.event.inputs.channel }}
        run: |
          python3 -c "
          from skapa import sheet_loader, config
          ch = sheet_loader.find(sheet_loader.load_local(), '${CHANNEL}')
          assert ch, 'チャンネルが見つかりません: ${CHANNEL}'
          path = config.channel_draft_dir(ch.slug) / config.STEP_FILENAMES[8]
          assert path.exists(), f'08_final.html がありません: {path}'
          print(f'OK: {ch.name} ({ch.slug}) - {path}')
          "

      - name: スクリーンショット取得
        env:
          CHANNEL: ${{ github.event.inputs.channel }}
        run: |
          python3 -m skapa.screenshot "${CHANNEL}"

      - name: WordPress 投稿
        env:
          CHANNEL: ${{ github.event.inputs.channel }}
          STATUS: ${{ github.event.inputs.status }}
          SKYPERFECT_WP_USERNAME: ${{ secrets.SKYPERFECT_WP_USERNAME }}
          SKYPERFECT_WP_APP_PASSWORD: ${{ secrets.SKYPERFECT_WP_APP_PASSWORD }}
        run: |
          python3 -m skapa.wp_post "${CHANNEL}" --status "${STATUS}"

      - name: 成果物（スクショ・投稿ID）をコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f skapa/drafts/*/screenshots/ skapa/drafts/*/wp_post_id.json || true
          if git diff --cached --quiet; then
            echo "コミット対象なし"
          else
            git commit -m "skapa: ${{ github.event.inputs.channel }} の投稿成果物を保存"
            git push origin HEAD:${GITHUB_REF#refs/heads/}
          fi
