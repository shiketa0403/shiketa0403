<style>

  html, body {
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    color: #222;
    background: #f3f6fa;
    line-height: 1.6;
    -webkit-text-size-adjust: 100%;
  }
  .sk-wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 0 12px 80px;
  }
  .sk-header {
    background: linear-gradient(135deg, #003D7A 0%, #0066CC 100%);
    color: #fff;
    padding: 22px 18px;
    border-radius: 0 0 14px 14px;
    margin-bottom: 16px;
    text-align: center;
    box-shadow: 0 4px 12px rgba(0,61,122,0.18);
  }
  .sk-title {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .sk-subtitle {
    font-size: 12px;
    margin-top: 4px;
    opacity: 0.92;
  }
  .sk-card {
    background: #fff;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .sk-step {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .sk-step-num {
    background: #0066CC;
    color: #fff;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    flex-shrink: 0;
  }
  .sk-step-label {
    font-weight: 700;
    color: #003D7A;
    font-size: 16px;
  }
  .sk-row {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }
  .sk-field {
    flex: 1 1 calc(50% - 6px);
    min-width: 140px;
  }
  .sk-field-label {
    display: block;
    font-size: 13px;
    color: #555;
    margin-bottom: 4px;
    font-weight: 600;
  }
  .sk-select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #cfd8e3;
    border-radius: 8px;
    font-size: 15px;
    background: #fff;
    color: #222;
    appearance: none;
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='%230066CC' d='M6 8L0 0h12z'/></svg>");
    background-repeat: no-repeat;
    background-position: right 12px center;
    padding-right: 32px;
  }
  .sk-select:focus {
    outline: none;
    border-color: #0066CC;
    box-shadow: 0 0 0 3px rgba(0,102,204,0.15);
  }
  .sk-genre {
    margin-bottom: 8px;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    overflow: hidden;
  }
  .sk-genre-summary {
    padding: 12px 14px;
    background: #f1f5fa;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    color: #003D7A;
    list-style: none;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .sk-genre-summary::-webkit-details-marker { display: none; }
  .sk-genre-summary::after {
    content: "▼";
    font-size: 10px;
    color: #0066CC;
    transition: transform 0.2s;
  }
  details[open] > .sk-genre-summary::after {
    transform: rotate(180deg);
  }
  .sk-genre-count {
    font-size: 12px;
    color: #0066CC;
    background: #e0ecf9;
    padding: 2px 8px;
    border-radius: 10px;
    margin-left: auto;
    margin-right: 8px;
  }
  .sk-items {
    padding: 6px 0;
  }
  .sk-item {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    border-top: 1px solid #f0f3f7;
    cursor: pointer;
    transition: background 0.1s;
  }
  .sk-item:hover { background: #f9fbfd; }
  .sk-item input[type="checkbox"] {
    width: 18px;
    height: 18px;
    margin: 0 10px 0 0;
    accent-color: #0066CC;
    flex-shrink: 0;
  }
  .sk-item-name {
    flex: 1;
    font-size: 14px;
    color: #333;
  }
  .sk-item-price {
    font-size: 13px;
    color: #0066CC;
    font-weight: 700;
    white-space: nowrap;
    margin-left: 8px;
  }
  .sk-item-desc {
    display: block;
    font-size: 11px;
    color: #888;
    margin-top: 2px;
  }
  .sk-section-label {
    font-size: 13px;
    font-weight: 700;
    color: #003D7A;
    margin: 6px 0 8px;
    padding-left: 8px;
    border-left: 3px solid #0066CC;
  }
  .sk-result-empty {
    text-align: center;
    color: #888;
    font-size: 14px;
    padding: 20px;
  }
  .sk-result-period {
    background: #eaf3fc;
    color: #003D7A;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 12px;
    line-height: 1.5;
  }
  .sk-breakdown {
    margin: 12px 0;
  }
  .sk-line {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 8px 0;
    border-bottom: 1px dashed #e2e8f0;
    font-size: 13px;
  }
  .sk-line-name {
    flex: 1;
    padding-right: 8px;
  }
  .sk-line-price {
    text-align: right;
    white-space: nowrap;
    font-weight: 600;
  }
  .sk-old-price {
    color: #999;
    text-decoration: line-through;
    font-size: 12px;
    font-weight: 400;
    display: inline-block;
    margin-right: 4px;
  }
  .sk-discount-tag {
    display: inline-block;
    font-size: 10px;
    background: #ffe9c2;
    color: #a05a00;
    padding: 1px 6px;
    border-radius: 8px;
    margin-left: 4px;
    font-weight: 600;
    vertical-align: middle;
  }
  .sk-monthly {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-top: 2px solid #003D7A;
    margin-top: 8px;
    font-size: 14px;
    font-weight: 700;
    color: #003D7A;
  }
  .sk-total-box {
    background: linear-gradient(135deg, #003D7A 0%, #0066CC 100%);
    color: #fff;
    padding: 18px;
    border-radius: 10px;
    text-align: center;
    margin-top: 14px;
    box-shadow: 0 4px 10px rgba(0,61,122,0.2);
  }
  .sk-total-label {
    font-size: 13px;
    opacity: 0.92;
    margin-bottom: 4px;
  }
  .sk-total-value {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .sk-total-sub {
    font-size: 11px;
    opacity: 0.85;
    margin-top: 4px;
  }
  .sk-reset {
    display: block;
    width: 100%;
    margin-top: 12px;
    padding: 10px;
    background: #fff;
    color: #0066CC;
    border: 1px solid #0066CC;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .sk-reset:hover { background: #f0f7ff; }

  @media (max-width: 480px) {
    .sk-title { font-size: 18px; }
    .sk-field { flex: 1 1 100%; }
    .sk-total-value { font-size: 24px; }
    .sk-item-name { font-size: 13px; }
    .sk-item-price { font-size: 12px; }
  }

  // type: "set"  -> 指定セットのいずれかが選択されていれば適用

  // ---------- helpers ----------
  function $(sel, root) { return (root || document).querySelector(sel); }
  function el(tag, attrs, children) {
    var n = document.createElement(tag);
    if (attrs) {
      for (var k in attrs) {
        if (k === "class") n.className = attrs[k];
        else if (k === "html") n.innerHTML = attrs[k];
        else if (k === "text") n.textContent = attrs[k];
        else n.setAttribute(k, attrs[k]);
      }
    }
    if (children) {
      for (var i = 0; i < children.length; i++) {
        if (children[i]) n.appendChild(children[i]);
      }
    }
    return n;
  }
  function yen(n) {
    return "¥" + n.toLocaleString("ja-JP");
  }

  // ---------- build dropdowns ----------
  function buildMonthSelects() {
    var start = $("#sk-start");
    var end = $("#sk-end");
    for (var m = 1; m <= 12; m++) {
      var optS = document.createElement("option");
      optS.value = String(m);
      optS.textContent = m + "月";
      start.appendChild(optS);

      var optE = document.createElement("option");
      optE.value = String(m);
      optE.textContent = m + "月";
      end.appendChild(optE);
    }
    var optLong = document.createElement("option");
    optLong.value = "long";
    optLong.textContent = "1年以上利用";
    end.appendChild(optLong);

    start.value = "1";
    end.value = "long";
  }

  // ---------- build product list ----------
  function buildSets() {
    var wrap = $("#sk-sets");
    SETS.forEach(function(s) {
      wrap.appendChild(buildItem(s, true));
    });
  }

  function buildChannels() {
    var wrap = $("#sk-channels");
    GENRES.forEach(function(g) {
      var items = CHANNELS.filter(function(c) { return c.genre === g.key; });
      if (!items.length) return;

      var details = el("details", { class: "sk-genre" });
      var summary = el("summary", { class: "sk-genre-summary" });
      summary.appendChild(el("span", { text: g.name }));
      summary.appendChild(el("span", { class: "sk-genre-count", text: items.length + "ch" }));
      details.appendChild(summary);

      var inner = el("div", { class: "sk-items" });
      items.forEach(function(c) {
        inner.appendChild(buildItem(c, false));
      });
      details.appendChild(inner);
      wrap.appendChild(details);
    });
  }

  function buildItem(p, isSet) {
    var label = el("label", { class: "sk-item" });
    var cb = document.createElement("input");
    cb.type = "checkbox";
    cb.value = p.id;
    cb.dataset.kind = isSet ? "set" : "channel";
    cb.dataset.price = String(p.price);
    cb.dataset.name = p.name;
    cb.addEventListener("change", recalc);
    label.appendChild(cb);

    var nameWrap = el("div", { class: "sk-item-name" });
    nameWrap.appendChild(document.createTextNode(p.name));
    if (p.desc) {
      nameWrap.appendChild(el("span", { class: "sk-item-desc", text: p.desc }));
    }
    label.appendChild(nameWrap);

    label.appendChild(el("span", { class: "sk-item-price", text: yen(p.price) + "/月" }));
    return label;
  }

  // ---------- calculation ----------
  function getSelected() {
    var nodes = document.querySelectorAll('input[type="checkbox"]:checked');
    var sets = [];
    var channels = [];
    for (var i = 0; i < nodes.length; i++) {
      var n = nodes[i];
      var item = { id: n.value, name: n.dataset.name, price: Number(n.dataset.price) };
      if (n.dataset.kind === "set") sets.push(item);
      else channels.push(item);
    }
    return { sets: sets, channels: channels };
  }

  function applyDiscounts(selected) {
    var setIds = selected.sets.map(function(s) { return s.id; });
    var chIds = selected.channels.map(function(c) { return c.id; });
    var bestByTarget = {};

    DISCOUNTS.forEach(function(rule) {
      var matched = false;
      if (rule.type === "set") {
        matched = rule.keys.some(function(k) { return setIds.indexOf(k) !== -1; });
      } else if (rule.type === "channel") {
        matched = rule.keys.some(function(k) { return chIds.indexOf(k) !== -1; });
      }
      if (!matched) return;
      // 対象が選択されていなければスキップ
      var targetSelected = chIds.indexOf(rule.target) !== -1;
      if (!targetSelected) return;

      var current = bestByTarget[rule.target];
      if (!current || rule.newPrice < current.newPrice) {
        bestByTarget[rule.target] = rule;
      }
    });
    return bestByTarget;
  }

  function calcMonths(startVal, endVal) {
    if (endVal === "long") {
      return { useMonths: 13, billMonths: 12, longTerm: true };
    }
    var s = Number(startVal);
    var e = Number(endVal);
    var use;
    if (s < e)       use = e - s + 1;
    else if (s > e)  use = (12 - s) + e + 1;
    else             use = 1;

    var bill;
    if (s === e) bill = 1;        // 同月解約は1ヶ月分課金
    else         bill = use - 1;  // 加入月は無料
    return { useMonths: use, billMonths: bill, longTerm: false };
  }

  function recalc() {
    var selected = getSelected();
    var totalCount = selected.sets.length + selected.channels.length;
    var resultEl = $("#sk-result");
    resultEl.innerHTML = "";

    if (totalCount === 0) {
      resultEl.appendChild(el("div", {
        class: "sk-result-empty",
        text: "商品を1つ以上選ぶと料金が表示されます"
      }));
      return;
    }

    var months = calcMonths($("#sk-start").value, $("#sk-end").value);
    var discounts = applyDiscounts(selected);

    // 期間説明
    var periodText;
    if (months.longTerm) {
      periodText = "1年以上利用：基本料 + 視聴料を 12ヶ月分 お支払い（加入月は無料）";
    } else {
      var s = $("#sk-start").value, e = $("#sk-end").value;
      if (s === e) {
        periodText = s + "月加入 → " + e + "月解約：1ヶ月分のお支払い（同月解約のため）";
      } else {
        periodText = s + "月加入 → " + e + "月解約：利用 " + months.useMonths + "ヶ月／課金 " + months.billMonths + "ヶ月（加入月は無料）";
      }
    }
    resultEl.appendChild(el("div", { class: "sk-result-period", text: periodText }));

    // 内訳作成
    var breakdown = el("div", { class: "sk-breakdown" });
    breakdown.appendChild(buildLine("基本料", BASE_FEE, null, null));

    var watchTotal = 0;

    // セット
    selected.sets.forEach(function(s) {
      breakdown.appendChild(buildLine(s.name, s.price, null, null));
      watchTotal += s.price;
    });

    // チャンネル
    selected.channels.forEach(function(c) {
      var d = discounts[c.id];
      if (d) {
        breakdown.appendChild(buildLine(c.name, d.newPrice, c.price, d.label));
        watchTotal += d.newPrice;
      } else {
        breakdown.appendChild(buildLine(c.name, c.price, null, null));
        watchTotal += c.price;
      }
    });

    var monthly = BASE_FEE + watchTotal;
    var monthlyLine = el("div", { class: "sk-monthly" });
    monthlyLine.appendChild(el("span", { text: "月額合計" }));
    monthlyLine.appendChild(el("span", { text: yen(monthly) }));
    breakdown.appendChild(monthlyLine);

    resultEl.appendChild(breakdown);

    var total = monthly * months.billMonths;
    var totalBox = el("div", { class: "sk-total-box" });
    totalBox.appendChild(el("div", { class: "sk-total-label", text: "総支払額" }));
    totalBox.appendChild(el("div", { class: "sk-total-value", text: yen(total) }));
    var subText = months.longTerm
      ? "（月額 " + yen(monthly) + " × 12ヶ月）"
      : "（月額 " + yen(monthly) + " × " + months.billMonths + "ヶ月）";
    totalBox.appendChild(el("div", { class: "sk-total-sub", text: subText }));
    resultEl.appendChild(totalBox);
  }

  function buildLine(name, price, oldPrice, discountLabel) {
    var line = el("div", { class: "sk-line" });
    line.appendChild(el("div", { class: "sk-line-name", text: name }));

    var priceWrap = el("div", { class: "sk-line-price" });
    if (oldPrice && oldPrice !== price) {
      priceWrap.appendChild(el("span", { class: "sk-old-price", text: yen(oldPrice) }));
    }
    priceWrap.appendChild(document.createTextNode(yen(price)));
    if (discountLabel) {
      priceWrap.appendChild(el("span", { class: "sk-discount-tag", text: discountLabel }));
    }
    line.appendChild(priceWrap);
    return line;
  }

  function resetAll() {
    var nodes = document.querySelectorAll('input[type="checkbox"]:checked');
    for (var i = 0; i < nodes.length; i++) nodes[i].checked = false;
    $("#sk-start").value = "1";
    $("#sk-end").value = "long";
    recalc();
  }

  // ---------- init ----------
  document.addEventListener("DOMContentLoaded", function() {
    buildMonthSelects();
    buildSets();
    buildChannels();
    $("#sk-start").addEventListener("change", recalc);
    $("#sk-end").addEventListener("change", recalc);
    $("#sk-reset").addEventListener("click", resetAll);
    recalc();
  });

})();
</script>
</body>
</html>
